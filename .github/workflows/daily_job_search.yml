name: Daily Job Search

on:
  schedule:
    # Run every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:  # allow manual triggers

jobs:
  job-search:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore CV
        env:
          CV_BASE64: ${{ secrets.CV_BASE64 }}
        run: |
          if [ -f cv/CV.pdf ]; then
            echo "cv/CV.pdf found in repository"
          elif [ -n "$CV_BASE64" ]; then
            mkdir -p cv
            echo "$CV_BASE64" | base64 --decode > cv/CV.pdf
            echo "cv/CV.pdf decoded from CV_BASE64 secret"
          else
            echo "ERROR: No cv/CV.pdf in the repo and CV_BASE64 secret is not set." >&2
            echo "Either commit your CV.pdf to the cv/ folder, or encode it as base64 and add it as a repository secret named CV_BASE64." >&2
            exit 1
          fi
          CV_SIZE=$(wc -c < cv/CV.pdf)
          if [ "$CV_SIZE" -eq 0 ]; then
            echo "ERROR: cv/CV.pdf is empty." >&2
            exit 1
          fi
          echo "CV ready ($CV_SIZE bytes)"

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: python main.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-report-${{ github.run_id }}
          path: output/report.html
          if-no-files-found: warn

      - name: Upload scored jobs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-scored-${{ github.run_id }}
          path: data/jobs_scored.json
          if-no-files-found: warn
